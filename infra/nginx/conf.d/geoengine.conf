# GeoEngine — Virtual Host Configuration

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS (prod)
    # Закоментуйте для локальної розробки
    # return 301 https://$host$request_uri;

    # ---- API Server ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api_server;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout для повільних DEM запитів
        proxy_connect_timeout  30s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Кешування тайлів (PNG)
        location ~* ^/api/terrain/tile/\d+/\d+/\d+\.png$ {
            proxy_pass       http://api_server;
            proxy_cache_valid 200 24h;
            add_header       Cache-Control "public, max-age=86400";
        }
    }

    # ---- WebSocket ----
    location /ws {
        limit_req zone=ws burst=3 nodelay;

        proxy_pass         http://api_server;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;

        # WebSocket таймаути (довгі з'єднання)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # Вимикаємо буферизацію для real-time
        proxy_buffering off;
    }

    # ---- Health check ----
    location /health {
        proxy_pass http://api_server;
        access_log off;
    }

    # ---- Next.js Viewer ----
    location / {
        proxy_pass         http://viewer_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket
        location /_next/webpack-hmr {
            proxy_pass http://viewer_app;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Статика Next.js (довгий кеш)
        location /_next/static/ {
            proxy_pass  http://viewer_app;
            add_header  Cache-Control "public, max-age=31536000, immutable";
            access_log  off;
        }
    }
}

