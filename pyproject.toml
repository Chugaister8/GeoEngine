# GeoEngine — Python Workspace Root
# uv workspace конфігурація

[tool.uv.workspace]
members = [
  "packages/core-python",
  "apps/server",
  "apps/cli",
]

[tool.uv]
dev-dependencies = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.2",
  "hypothesis>=6.98",
  "pip-audit>=2.7",
]

# ----------------------------------------------------------------
# Ruff (shared config)
# ----------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length    = 100
exclude        = [".venv", "node_modules", "dist", ".git"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "ANN", "S", "RUF"]
ignore = ["ANN101", "ANN102", "S101", "ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py"       = ["ANN", "S"]
"**/conftest.py"      = ["ANN"]

# ----------------------------------------------------------------
# Mypy (shared config)
# ----------------------------------------------------------------
[tool.mypy]
python_version        = "3.11"
warn_return_any       = true
warn_unused_configs   = true
disallow_untyped_defs = true
ignore_missing_imports = true
plugins               = ["pydantic.mypy"]

# ----------------------------------------------------------------
# Pytest (shared config)
# ----------------------------------------------------------------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests/python"]
addopts      = "-v --tb=short"
