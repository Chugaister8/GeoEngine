# GeoEngine — Docker Compose
# Запуск: docker compose up --build
#
# Сервіси:
#   server  — Python FastAPI (terrain, OSM, WebSocket)
#   viewer  — Next.js 14 (3D вьюер)
#   redis   — кеш тайлів та сесій
#   nginx   — reverse proxy + SSL termination
#
# Профілі:
#   dev:  server + viewer (з hot reload)
#   prod: всі сервіси + nginx

name: geoengine

# ----------------------------------------------------------------
# VOLUMES
# ----------------------------------------------------------------
volumes:
  dem_cache:
    driver: local
  osm_cache:
    driver: local
  redis_data:
    driver: local
  nginx_certs:
    driver: local

# ----------------------------------------------------------------
# NETWORKS
# ----------------------------------------------------------------
networks:
  geoengine_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ----------------------------------------------------------------
# SERVICES
# ----------------------------------------------------------------
services:

  # ---- Redis (tile cache + sessions) ----
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - geoengine_internal
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 600M

  # ---- Python FastAPI Server ----
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    networks:
      - geoengine_internal
    ports:
      - "8000:8000"
    volumes:
      - dem_cache:/root/.geoengine/dem_cache
      - osm_cache:/root/.geoengine/osm_cache
      # Dev: монтуємо код для hot reload
      - ./packages/core-python:/app/packages/core-python:ro
      - ./apps/server:/app/apps/server:ro
    environment:
      # Основні
      GEOENGINE_HOST:         "0.0.0.0"
      GEOENGINE_PORT:         "8000"
      GEOENGINE_DEBUG:        "${GEOENGINE_DEBUG:-false}"
      GEOENGINE_LOG_LEVEL:    "${GEOENGINE_LOG_LEVEL:-INFO}"
      GEOENGINE_JSON_LOGS:    "${GEOENGINE_JSON_LOGS:-false}"
      # Кеш
      GEOENGINE_DEM_CACHE_DIR: "/root/.geoengine/dem_cache"
      GEOENGINE_REDIS_URL:    "redis://redis:6379/0"
      # API ключі (з .env файлу)
      GEOENGINE_DEM_API_KEYS: "${GEOENGINE_DEM_API_KEYS:-{}}"
      # CORS
      GEOENGINE_CORS_ORIGINS: >
        ["http://localhost:3000","http://viewer:3000","${VIEWER_URL:-http://localhost:3000}"]
      # Workers
      GEOENGINE_TERRAIN_WORKERS:  "${TERRAIN_WORKERS:-4}"
      GEOENGINE_ANALYSIS_WORKERS: "${ANALYSIS_WORKERS:-2}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ---- Next.js Viewer ----
  viewer:
    build:
      context: .
      dockerfile: apps/viewer/Dockerfile
      target: ${BUILD_TARGET:-production}
      args:
        NEXT_PUBLIC_WS_URL:    "${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
        NEXT_PUBLIC_API_URL:   "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
    restart: unless-stopped
    networks:
      - geoengine_internal
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:              "${NODE_ENV:-production}"
      NEXT_PUBLIC_WS_URL:    "${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
      NEXT_PUBLIC_API_URL:   "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- Nginx reverse proxy (prod only) ----
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    profiles: ["prod"]
    networks:
      - geoengine_internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - server
      - viewer
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
