[project]
name = "geoengine-core"
version = "0.1.0"
description = "GeoEngine Python Core — геопросторовий рушій"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"

authors = [
  { name = "GeoEngine Contributors" }
]

keywords = ["gis", "3d", "terrain", "geospatial", "dem", "rendering"]

classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: GIS",
  "Typing :: Typed",
]

# ------------------------------------------------------------------
# Залежності
# ------------------------------------------------------------------
dependencies = [
  # Геопросторова обробка
  "rasterio>=1.3",           # GeoTIFF, DEM читання
  "pyproj>=3.6",             # CRS трансформації (PROJ)
  "shapely>=2.0",            # Геометричні операції
  "numpy>=1.26",             # Масиви (heightmap, mesh)

  # Серіалізація / конфіг
  "pydantic>=2.5",           # Моделі даних + валідація
  "pydantic-settings>=2.1",  # ENV конфіг

  # Логування
  "structlog>=24.1",         # Структуроване логування

  # Async
  "anyio>=4.2",              # Async I/O абстракція
]

[project.optional-dependencies]
# Повний стек для роботи з даними
data = [
  "laspy>=2.5",              # LAS/LAZ хмари точок
  "open3d>=0.18",            # 3D обробка хмар точок
  "trimesh>=4.0",            # Mesh маніпуляції
  "scipy>=1.12",             # Interpolation, spatial
  "geopandas>=0.14",         # Векторні геодані
]

# Серверна частина
server = [
  "fastapi>=0.109",
  "uvicorn[standard]>=0.27",
  "websockets>=12.0",
  "httpx>=0.26",             # Async HTTP для зовнішніх API
  "aiofiles>=23.2",
]

# Розробка та тести
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.2",               # Linter + formatter
  "hypothesis>=6.98",        # Property-based тести
]

[project.scripts]
geoengine = "geoengine.cli:app"

# ------------------------------------------------------------------
# Build
# ------------------------------------------------------------------
[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["geoengine"]

# ------------------------------------------------------------------
# uv (рекомендований менеджер пакетів)
# ------------------------------------------------------------------
[tool.uv]
dev-dependencies = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "mypy>=1.8",
  "ruff>=0.2",
  "hypothesis>=6.98",
]

# ------------------------------------------------------------------
# Ruff (linter + formatter)
# ------------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length    = 100

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "UP",   # pyupgrade
  "ANN",  # flake8-annotations
  "S",    # flake8-bandit (security)
  "RUF",  # ruff-specific
]
ignore = [
  "ANN101",  # self type annotation
  "ANN102",  # cls type annotation
  "S101",    # assert у тестах — ок
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S"]

# ------------------------------------------------------------------
# Mypy
# ------------------------------------------------------------------
[tool.mypy]
python_version         = "3.11"
strict                 = true
warn_return_any        = true
warn_unused_configs    = true
disallow_untyped_defs  = true
disallow_any_generics  = true
plugins                = ["pydantic.mypy"]

# ------------------------------------------------------------------
# Pytest
# ------------------------------------------------------------------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]
addopts      = "-v --cov=geoengine --cov-report=term-missing"
