# GeoEngine — Security Scanning
# Запускається щотижня та при push на main

name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"   # кожен понеділок о 02:00

jobs:

  # Python dependency audit
  python-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-packages --frozen

      - name: pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit \
            --requirement packages/core-python/pyproject.toml \
            --requirement apps/server/pyproject.toml \
            --format markdown \
            --output audit-python.md || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: python-audit
          path: audit-python.md

  # JS dependency audit
  js-audit:
    name: JavaScript Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: "9.0.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level moderate || true

  # Docker image scanning (Trivy)
  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: |
          docker build \
            -f apps/server/Dockerfile \
            --target production \
            -t geoengine-server:scan .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    geoengine-server:scan
          format:       sarif
          output:       trivy-results.sarif
          severity:     CRITICAL,HIGH
          exit-code:    "0"   # не ламаємо CI, тільки звітуємо

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
